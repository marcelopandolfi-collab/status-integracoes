<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Status Report — Integrações</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0c10;
            --surface:   #111318;
            --border:    #1e2230;
            --muted:     #3a3f52;
            --text-dim:  #6b7280;
            --text:      #c9d1e0;
            --text-hi:   #f0f4ff;

            --green:     #22c55e;
            --green-dim: rgba(34,197,94,.12);
            --blue:      #3b82f6;
            --blue-dim:  rgba(59,130,246,.12);
            --amber:     #f59e0b;
            --amber-dim: rgba(245,158,11,.12);
            --gray-dim:  rgba(156,163,175,.10);

            --col-w: 340px;
            --radius: 12px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            overflow: hidden;
        }

        /* ── NOISE TEXTURE ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            background-size: 180px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── LAYOUT ── */
        .shell {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── HEADER ── */
        header {
            flex-shrink: 0;
            padding: 22px 32px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            background: rgba(10,12,16,.85);
            backdrop-filter: blur(12px);
        }

        .header-left h1 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--text-hi);
            letter-spacing: -.5px;
        }

        .header-left .sub {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            position: relative;
        }
        .pulse::after {
            content: '';
            position: absolute; inset: -3px;
            border-radius: 50%;
            background: var(--green);
            opacity: .3;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1);opacity:.3} 50%{transform:scale(1.8);opacity:0} }

        /* KPI CHIPS */
        .kpis {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .kpi {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 18px;
            text-align: center;
            min-width: 82px;
            transition: border-color .2s;
        }
        .kpi:hover { border-color: var(--muted); }

        .kpi-num {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            line-height: 1;
            color: var(--text-hi);
        }
        .kpi-num.green { color: var(--green); }
        .kpi-num.blue  { color: var(--blue);  }
        .kpi-num.amber { color: var(--amber); }

        .kpi-label {
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* ── ERROR BANNER ── */
        #error-banner {
            display: none;
            background: rgba(239,68,68,.1);
            border-bottom: 1px solid rgba(239,68,68,.3);
            padding: 10px 32px;
            font-size: 13px;
            color: #f87171;
            flex-shrink: 0;
        }

        /* ── LOADING ── */
        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 16px;
            color: var(--text-dim);
            font-size: 13px;
        }

        .spinner {
            width: 32px; height: 32px;
            border: 2px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── BOARD ── */
        #board-wrap {
            display: none;
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 24px 32px 28px;
        }

        #board {
            display: flex;
            gap: 20px;
            height: 100%;
            align-items: flex-start;
        }

        /* ── COLUMN ── */
        .col {
            flex-shrink: 0;
            width: var(--col-w);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            max-height: 100%;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp .4s forwards;
        }
        .col:nth-child(1) { animation-delay: .05s }
        .col:nth-child(2) { animation-delay: .12s }
        .col:nth-child(3) { animation-delay: .19s }
        .col:nth-child(4) { animation-delay: .26s }
        @keyframes fadeUp { to { opacity:1; transform:translateY(0) } }

        .col-header {
            padding: 14px 16px 13px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .col-title {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-hi);
            letter-spacing: .01em;
        }

        .col-badge {
            font-size: 11px;
            font-weight: 600;
            background: rgba(255,255,255,.06);
            color: var(--text-dim);
            padding: 2px 9px;
            border-radius: 99px;
        }

        .col-body {
            padding: 14px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .col-body::-webkit-scrollbar { width: 3px; }
        .col-body::-webkit-scrollbar-track { background: transparent; }
        .col-body::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 4px; }

        /* ── CARD ── */
        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 14px 12px;
            border-left-width: 3px;
            transition: border-color .2s, transform .15s, box-shadow .15s;
            cursor: default;
        }
        .card:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(0,0,0,.35);
        }

        .card.green { border-left-color: var(--green); }
        .card.blue  { border-left-color: var(--blue);  }
        .card.amber { border-left-color: var(--amber); }
        .card.gray  { border-left-color: var(--muted); }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .card-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-hi);
            line-height: 1.2;
        }

        .badge {
            flex-shrink: 0;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            padding: 3px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .badge.green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
        .badge.blue  { background: var(--blue-dim);  color: var(--blue);  border: 1px solid rgba(59,130,246,.2); }
        .badge.amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,.2); }
        .badge.gray  { background: var(--gray-dim);  color: var(--text-dim); border: 1px solid rgba(156,163,175,.15); }

        .card-desc {
            font-size: 12.5px;
            color: var(--text-dim);
            line-height: 1.55;
            margin-bottom: 12px;
        }

        /* PROGRESS */
        .progress-wrap { margin-bottom: 12px; }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 5px;
        }
        .progress-bar {
            height: 3px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 99px;
            transition: width .6s ease;
        }
        .progress-fill.green { background: var(--green); }
        .progress-fill.blue  { background: var(--blue);  }
        .progress-fill.amber { background: var(--amber); }
        .progress-fill.gray  { background: var(--muted); }

        /* NEXT MILESTONE */
        .milestone {
            background: rgba(255,255,255,.03);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 9px 11px;
        }
        .milestone-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .milestone-text {
            font-size: 12.5px;
            color: var(--text);
            line-height: 1.4;
        }

        /* ── FOOTER ── */
        footer {
            flex-shrink: 0;
            padding: 10px 32px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--muted);
            background: rgba(10,12,16,.6);
            backdrop-filter: blur(8px);
        }

        /* ── SCROLLBAR BOARD ── */
        #board-wrap::-webkit-scrollbar { height: 4px; }
        #board-wrap::-webkit-scrollbar-track { background: transparent; }
        #board-wrap::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 4px; }
    </style>
</head>
<body>
<div class="shell">

    <!-- HEADER -->
    <header>
        <div class="header-left">
            <h1>Status Report — Integrações</h1>
            <div class="sub">
                <span class="pulse"></span>
                <span id="last-updated">Carregando...</span>
            </div>
        </div>
        <div class="kpis" id="kpis"></div>
    </header>

    <!-- ERROR -->
    <div id="error-banner">
        ⚠️ Não foi possível carregar <code>data.json</code>. Verifique se o arquivo existe e está acessível.
    </div>

    <!-- LOADING -->
    <div id="loading">
        <div class="spinner"></div>
        <span>Carregando dados...</span>
    </div>

    <!-- BOARD -->
    <div id="board-wrap">
        <div id="board"></div>
    </div>

    <!-- FOOTER -->
    <footer>
        <span id="footer-parceiros"></span>
        <span>Status Report Executivo · Integrações</span>
    </footer>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const DATA_URL = 'data.json';

// ── HELPERS ─────────────────────────────────────────────────────────────────
function colorFor(status) {
    const s = (status || '').toLowerCase();
    if (s.includes('dia') || s.includes('prd') || s.includes('produção')) return 'green';
    if (s.includes('hml') || s.includes('homolog'))                        return 'blue';
    if (s.includes('aguard'))                                               return 'amber';
    return 'gray';
}

function kpiCounts(fases) {
    const counts = {};
    fases.forEach(f => {
        counts[f.id] = f.parceiros.length;
    });
    return counts;
}

// ── RENDER KPIs ──────────────────────────────────────────────────────────────
function renderKpis(fases) {
    const colorMap = { acesso: '', integracao: '', homologacao: 'blue', producao: 'green' };
    const container = document.getElementById('kpis');
    fases.forEach(f => {
        const c = colorMap[f.id] || '';
        container.innerHTML += `
            <div class="kpi">
                <div class="kpi-num ${c}">${f.parceiros.length}</div>
                <div class="kpi-label">${f.kpi_label || f.titulo}</div>
            </div>`;
    });
}

// ── RENDER BOARD ─────────────────────────────────────────────────────────────
function renderBoard(fases) {
    const board = document.getElementById('board');
    board.innerHTML = '';

    fases.forEach(fase => {
        const col = document.createElement('div');
        col.className = 'col';

        const header = `
            <div class="col-header">
                <span class="col-title">${fase.titulo}</span>
                <span class="col-badge">${fase.parceiros.length} Parceiro${fase.parceiros.length !== 1 ? 's' : ''}</span>
            </div>`;

        let cards = '';
        fase.parceiros.forEach(p => {
            const color = colorFor(p.status);
            const pct   = Math.min(100, Math.max(0, p.progresso || 0));
            cards += `
                <div class="card ${color}">
                    <div class="card-top">
                        <span class="card-name">${p.nome}</span>
                        <span class="badge ${color}">${p.status}</span>
                    </div>
                    <p class="card-desc">${p.descricao}</p>
                    <div class="progress-wrap">
                        <div class="progress-meta">
                            <span>Progresso da Fase</span>
                            <span>${pct}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${color}" style="width:${pct}%"></div>
                        </div>
                    </div>
                    <div class="milestone">
                        <div class="milestone-label">${p.label_marco || 'Próximo Marco'}</div>
                        <div class="milestone-text">${p.proximo_marco}</div>
                    </div>
                </div>`;
        });

        col.innerHTML = header + `<div class="col-body">${cards}</div>`;
        board.appendChild(col);
    });
}

// ── RENDER FOOTER ────────────────────────────────────────────────────────────
function renderFooter(fases) {
    const total = fases.reduce((s, f) => s + f.parceiros.length, 0);
    document.getElementById('footer-parceiros').textContent = `${total} parceiros no portfólio`;
}

// ── MAIN ─────────────────────────────────────────────────────────────────────
async function init() {
    try {
        const res = await fetch(DATA_URL + '?v=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        document.getElementById('last-updated').textContent =
            'Visão unificada do portfólio · Atualizado em ' + data.atualizado_em;

        renderKpis(data.fases);
        renderBoard(data.fases);
        renderFooter(data.fases);

        document.getElementById('loading').style.display    = 'none';
        document.getElementById('board-wrap').style.display = 'block';

    } catch (err) {
        console.error(err);
        document.getElementById('loading').style.display       = 'none';
        document.getElementById('error-banner').style.display  = 'block';
    }
}

init();
</script>
</body>
</html>
